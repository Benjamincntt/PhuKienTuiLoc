# /etc/nginx/sites-available/phukientuiloc
# Thay YOUR_DOMAIN bằng baobiantea.com hoặc IP public/LAN khi test.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    client_max_body_size 10M;

    root /var/www/publish/store;
    index index.html;

    # API + uploads -> backend
    location /api/ {
        proxy_pass http://127.0.0.1:5280/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5280/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Admin panel (SPA, base /admin-panel/)
    # ^~ = uu tien hon regex static *.js/*.png — tranh 404 asset admin
    location ^~ /admin-panel/ {
        alias /var/www/publish/admin/;
        index index.html;
        try_files $uri $uri/ /admin-panel/index.html;
    }

    location = /admin-panel {
        return 301 /admin-panel/;
    }

    # Static files (favicon, og-image, logo...) — KHONG fallback index.html
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|txt|xml|json|js|css|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Store SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
